apiVersion: apps/v1
kind: Deployment
metadata:
  name: project3-text-processor
spec:
  replicas: 2
  selector:
    matchLabels:
      app: project3-text-processor
  template:
    metadata:
      labels:
        app: project3-text-processor
    spec:
      containers:
        - name: text-processor
          image: project3-text-processor:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c", "python /app/script.py && sleep 3600"]
